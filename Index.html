<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ;
      filterMinCF: 0.001;
      filterBeta: 0.005;
      warmupTolerance: 5;
      missTolerance: 8;"
      color-space="sRGB"
      loading-screen="enabled: false"
      renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
		    <a-asset-item id="glb" src=""></a-asset-item>
      </a-assets>   

      
	  <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse" raycaster="far: 10000; objects: .clickable"></a-camera>
	  

      <a-entity mindar-image-target="targetIndex: 0"> 
		  	<a-gltf-model src="#glb" position="0 0 0" rotation="0 0 0" scale="0.2 0.2 0.2" animation="property: rotation; to: 0 360 0; dur: 50000; easing: linear; loop: true"></a-gltf-model  
	  </a-entity>
		
	 <a-entity light="type: ambient; color: #FFF; intensity: 1.2"></a-entity>
	 <a-entity light="type: directional; color: #FFF; intensity: 5.0" position="1 2 1" scale="0.08 0.08 0.08"></a-entity>
	 <a-entity light="type: directional; color: #FFF; intensity: 3.5" position="-1 2 0" scale="0.08 0.08 0.08"></a-entity>
      
    </a-scene>
  </body>
</html>
