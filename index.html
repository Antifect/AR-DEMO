<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
	<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script> 
 	<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
  
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc:https://antifect.github.io/AR-DEMO/Assets/Target/targets.mind"
      filterMinCF: 0.001;
      filterBeta: 0.005;
      warmupTolerance: 5;
      missTolerance: 8;
      color-space="sRGB"
      loading-screen="enabled: false"
      renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
		    <a-asset-item id="glb" src="https://antifect.github.io/AR-DEMO/Assets/GLB/Working.glb"></a-asset-item>
      </a-assets>   

      
	  <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse" raycaster="far: 10000; objects: .clickable"></a-camera>
	  

      <a-entity mindar-image-target="targetIndex: 0"> 
		  	<a-gltf-model src="#glb" 
				animation-mixer="clip: *; loop: repeat"
				position="0 0 0"
				rotation="0 0 0"
				scale="1 1 1"
				animation="property: rotation; to: 0 360 0; dur: 50000; easing: linear; loop: true">
				</a-gltf-model> 
	  </a-entity>
		
	 <a-entity light="type: ambient; color: #FFF; intensity: 1.2"></a-entity>
	 <a-entity light="type: directional; color: #FFF; intensity: 5.0" position="1 2 1" scale="0.08 0.08 0.08"></a-entity>
	 <a-entity light="type: directional; color: #FFF; intensity: 3.5" position="-1 2 0" scale="0.08 0.08 0.08"></a-entity>
      
    </a-scene>
  </body>
</html>
